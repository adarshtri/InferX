version: '3.8'

services:
  inferx:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "8080:8080"
    environment:
      - SCENARIO=${SCENARIO:-default}
      - BATCH_SIZE=${BATCH_SIZE:-10}
      - NUM_WORKERS=${NUM_WORKERS:-8}
      - QUEUE_SIZE=${QUEUE_SIZE:-100}
      - BATCH_TIMEOUT_MS=${BATCH_TIMEOUT_MS:-100}
    restart: always
